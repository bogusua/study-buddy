<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <span class="header-icon">📚</span>
      <span class="header-title">Study Buddy</span>
      <div class="header-spacer"></div>
      <div class="font-size-dropdown" id="font-size-dropdown">
        <button class="font-size-trigger" id="font-size-trigger" title="Розмір шрифта">A</button>
        <div class="font-size-menu" id="font-size-menu">
          <button class="font-size-option" data-size="small">A<span>Малий</span></button>
          <button class="font-size-option" data-size="medium">A<span>Середній</span></button>
          <button class="font-size-option" data-size="large">A<span>Великий</span></button>
        </div>
      </div>
      <button id="btn-stats" class="theme-toggle" title="Статистика">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
      <button id="btn-settings" class="theme-toggle" title="Налаштування">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="theme-toggle" class="theme-toggle" title="Переключити тему">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <div id="subheader" class="subheader">
      <div id="exam-btns" class="exam-btns">
        <button id="btn-new-exam" class="header-btn">Новий іспит</button>
        <button id="btn-weak-exam" class="header-btn header-btn--weak hidden">Слабкі теми</button>
        <button id="btn-change-subject" class="header-btn header-btn--ghost">Змінити предмет</button>
      </div>
      <div id="stopwatch" class="stopwatch">0:00</div>
    </div>

    <div id="exam-progress" class="exam-progress hidden">
      <div id="exam-progress-fill" class="exam-progress-fill"></div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input-wrap">
    <div class="input-area">
      <textarea
        id="user-input"
        class="user-input"
        placeholder="Введи відповідь..."
        autocomplete="off"
        maxlength="1000"
        rows="1"
      ></textarea>
      <button id="send-btn" class="send-btn" title="Надіслати">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter — надіслати &nbsp;·&nbsp; Shift+Enter — новий рядок</div>
    </div>

  <!-- Stats modal -->
  <div id="stats-modal" class="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <span class="settings-title">Статистика</span>
        <button id="stats-close" class="settings-close">&times;</button>
      </div>
      <div id="stats-content" class="stats-content"></div>
      <div id="stats-tooltip" class="stats-tooltip"></div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-modal" class="confirm-modal">
    <div class="confirm-dialog">
      <div id="confirm-text" class="confirm-text"></div>
      <div class="confirm-actions">
        <button id="confirm-yes" class="confirm-btn confirm-btn--danger">Очистити</button>
        <button id="confirm-no" class="confirm-btn confirm-btn--cancel">Скасувати</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <span class="settings-title">Налаштування</span>
        <button id="settings-close" class="settings-close">&times;</button>
      </div>
      <form id="settings-form" class="settings-form">
        <label class="settings-label">
          API ключ Gemini
          <div class="settings-apikey-wrap">
            <input id="settings-apikey" type="password" class="settings-input" placeholder="AIza..." autocomplete="off">
            <button type="button" id="settings-apikey-toggle" class="settings-apikey-toggle">Показати</button>
          </div>
        </label>
        <label class="settings-label">
          Ім'я учня
          <input id="settings-name" type="text" class="settings-input" placeholder="Тимофій">
        </label>
        <label class="settings-label">
          Клас вступу
          <input id="settings-grade" type="number" class="settings-input" min="2" max="12">
        </label>
        <label class="settings-label">
          Питань за сесію
          <input id="settings-questions" type="number" class="settings-input" min="3" max="20">
        </label>
        <label class="settings-label">
          Розмір есе
          <select id="settings-essay-size" class="settings-input">
            <option value="short">Коротке (8–10 речень)</option>
            <option value="medium">Середнє (12–15 речень)</option>
            <option value="long">Розгорнуте (18–22 речення)</option>
          </select>
        </label>
        <label class="settings-label">
          Модель Gemini
          <input id="settings-model" type="text" class="settings-input" placeholder="gemini-2.5-flash-lite-preview">
        </label>
        <div class="settings-nano-wrap">
          <label class="settings-label settings-label--row">
            <input id="settings-nano" type="checkbox">
            Використовувати Gemini Nano (локальна валідація)
          </label>
          <div id="settings-nano-hint" class="settings-nano-hint hidden"></div>
        </div>
        <button type="submit" class="settings-save">Зберегти</button>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/nano.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
