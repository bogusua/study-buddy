<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <span class="header-icon">📚</span>
      <span class="header-title">Study Buddy</span>
      <div id="header-actions" class="header-actions">
        <button id="btn-new-exam" class="header-btn">Новий іспит</button>
        <button id="btn-change-subject" class="header-btn header-btn--ghost">Змінити предмет</button>
      </div>
      <div class="header-spacer"></div>
      <div id="stopwatch" class="stopwatch hidden">0:00</div>
      <div class="font-size-toggle">
        <button class="font-size-btn" data-size="small" title="Малий шрифт">A</button>
        <button class="font-size-btn" data-size="medium" title="Середній шрифт">A</button>
        <button class="font-size-btn" data-size="large" title="Великий шрифт">A</button>
      </div>
      <button id="theme-toggle" class="theme-toggle" title="Переключити тему">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <div id="messages" class="messages"></div>

    <div class="input-wrap">
    <div class="input-area">
      <textarea
        id="user-input"
        class="user-input"
        placeholder="Введи відповідь..."
        autocomplete="off"
        maxlength="1000"
        rows="1"
      ></textarea>
      <button id="send-btn" class="send-btn" title="Надіслати">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter — надіслати &nbsp;·&nbsp; Shift+Enter — новий рядок</div>
    </div>

  <script src="js/storage.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
